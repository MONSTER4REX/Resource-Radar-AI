name: field_agent
description: ResourceRadar AI — Field Agent mobile app for humanitarian signal collection.
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: any
  firebase_auth: any
  cloud_firestore: any
  firebase_storage: any

  # Location
  geolocator: any
  geocoding: any

  # Camera / Image
  image_picker: any
  flutter_image_compress: any
  path_provider: any
  uuid: any
  local_auth: any

  # State Management
  provider: any

  # UI / UX
  cupertino_icons: any
  google_fonts: any
  flutter_animate: any
  intl: any
  cached_network_image: any
  shimmer: any
  lottie: any

  # Connectivity
  connectivity_plus: any
  lucide_icons_flutter: ^3.1.13

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/animations/
